{% extends 'base.html' %}
{% block content %}
<div class="container text-center p-5">
    <form method="post">{% csrf_token %}
        <div class="">
            <label for="nome" class="form-label">Nome</label>
            <input autofocus type="text" class="form-control p-3" required id="nome"
                   name="nome"
                   placeholder="Ex: Maria José da Silva">
        </div>
        <div class="d-grid align-center mx-auto col-xs-12 col-sm-12">
            <input class="btn btn-primary btn-block mt-2  p-3" type="submit" value="Atualizar">
        </div>
    </form>
</div>
{% endblock %}
